<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | J.H-B</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="math-canvas"></canvas>

    <nav class="navbar"
        style="border-bottom: 1px solid var(--border-color); background: rgba(12,12,12,0.9); z-index: 10;">
        <div class="logo" style="color: var(--text-primary);">J.H-B</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="art.html">Creative DNA</a>
            <a href="contact.html" style="color: var(--accent);">Contact</a>
        </div>
    </nav>

    <header class="hero" style="min-height: 30vh;">
        <div class="container" style="background: transparent; border: none; box-shadow: none; padding-left: 0;">
            <div class="cm-massive-title" style="margin-bottom: 2rem;">
                <div class="geo-letter shape-c"></div>
                <div class="geo-letter shape-o"></div>
                <div class="geo-letter shape-n"></div>
                <div class="geo-letter shape-t"></div>
                <div class="geo-letter shape-a"></div>
                <div class="geo-letter shape-c"></div>
                <div class="geo-letter shape-t"></div>
            </div>
            <p class="sub-hook" style="text-align: left;">Reach out for technical consulting, project management, or 0→1
                builds.</p>
            <p style="font-size: 1.1rem; max-width: 600px; margin-top: 1.5rem;">
                Whether you’re here to check out my latest projects or discuss a potential collaboration, I’d love to
                connect!
            </p>
        </div>
    </header>

    <section class="container" style="margin-bottom: 4rem; max-width: 1000px;">
        <div class="glass"
            style="display: flex; padding: 0; align-items: stretch; overflow: hidden; flex-wrap: wrap-reverse;">
            <div style="flex: 1; padding: 3rem; min-width: 300px;">
                <h2
                    style="font-family: 'Geist Mono', monospace; font-size: 1.15rem; text-transform: uppercase; margin-bottom: 2rem; color: var(--text-secondary);">
                    Send Transmission</h2>
                <form action="#" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required placeholder="Jane Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="hello@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required
                            placeholder="Let's build something beautiful."></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Submit Protocol</button>
                </form>
            </div>
            <div style="flex: 1; border-left: 1px dashed var(--border-hover); min-width: 300px;">
                <img src="assets/art/Art/cherry+blosso.webp" alt="Cherry Blossom Art Canvas"
                    style="width: 100%; height: 100%; object-fit: cover; display: block;">
            </div>
        </div>
    </section>

    <script src="geometry.js"></script>
</body>

</html>
